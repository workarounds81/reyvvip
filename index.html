const SG_PH_EVES = [
  "2026-01-16","2026-03-20","2026-04-02","2026-04-30","2026-05-26","2026-05-30","2026-08-08","2026-11-07","2026-12-24","2026-12-31",

];

const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const DAY_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON_NAMES = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

// Parse "YYYY-MM-DD" as a LOCAL date (avoids UTC day-shift bugs)
function parseLocal(str){
  if(!str) return null;
  const p = str.split("-").map(Number);
  if(p.length !== 3 || p.some(isNaN)) return null;
  return new Date(p[0], p[1]-1, p[2]);
}

// THE DATE STATUS CHECKER
function dateStatus(str){
  const d = parseLocal(str);
  if(!d) return null;
  const day = d.getDay();                       // 0 Sun ... 6 Sat
  const isClubNight = [3,4,5,6].includes(day);  // Wed/Thu/Fri/Sat
  const isEve = SG_PH_EVES.includes(str);       // Eve of SG Public Holiday
  const active = isClubNight || isEve;
  return {
    active, isClubNight, isEve, day,
    label: active ? "ACTIVE PARTY NIGHT" : "NON-PEAK / RESERVED ENQUIRIES ONLY",
    reason: isEve ? "Eve of Public Holiday" : (isClubNight ? DAY_FULL[day] + " · Club Night" : DAY_FULL[day] + " · Off-peak"),
  };
}

function fmtDateLong(str){
  const d = parseLocal(str);
  if(!d) return "—";
  return DAY_NAMES[d.getDay()] + ", " + String(d.getDate()).padStart(2,"0") + " " + MON_NAMES[d.getMonth()] + " " + d.getFullYear();
}
function fmtClock(s){
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

/* ============================================================
   PRIMITIVES
   ============================================================ */
function Pill({ children, className="" }){
  return <span className={"inline-flex items-center gap-1.5 rounded-full border border-white/10 bg-white/5 px-3 py-1 text-[11px] font-medium tracking-wide text-white/70 "+className}>{children}</span>;
}

function SectionTag({ n, children }){
  return (
    <div className="mb-4 flex items-center gap-3">
      <span className="font-mono text-xs text-neon-cyan">{n}</span>
      <span className="h-px w-8 bg-gradient-to-r from-neon-cyan to-transparent" />
      <span className="font-mono text-[11px] uppercase tracking-[0.28em] text-white/45">{children}</span>
    </div>
  );
}

function Toggle({ on, onChange, label, hint, accent="#a855f7" }){
  return (
    <button type="button" onClick={()=>onChange(!on)}
      className="group flex w-full items-center justify-between gap-4 rounded-2xl border border-white/10 bg-white/[0.03] p-4 text-left transition hover:border-white/20 hover:bg-white/[0.06]">
      <span className="min-w-0">
        <span className="block text-sm font-semibold text-white">{label}</span>
        {hint && <span className="mt-0.5 block text-xs leading-snug text-white/45">{hint}</span>}
      </span>
      <span className="relative h-7 w-12 shrink-0 rounded-full border transition"
        style={{ borderColor: on ? accent : "rgba(255,255,255,.18)", background: on ? accent+"33" : "rgba(255,255,255,.06)" }}>
        <span className="absolute top-1/2 h-5 w-5 -translate-y-1/2 rounded-full transition-all duration-300"
          style={{ left: on ? "calc(100% - 22px)" : "3px",
                   background: on ? "#fff" : "#9aa",
                   boxShadow: on ? "0 0 14px "+accent : "none" }} />
      </span>
    </button>
  );

/* Dancing sound wave */
function SoundWave({ playing, bars=60, className="" }){
  const arr = useMemo(()=>Array.from({length:bars}),[bars]);
  return (
    <div className={"flex h-full w-full items-end gap-[2px] "+className} aria-hidden="true">
      {arr.map((_,i)=>{
        const dur = 0.55 + ((i*7)%9)*0.085;
        const delay = ((i*5)%13)*0.06;
        const restH = 0.12 + ((i%5))*0.045;
        return (
          <span key={i} style={{
            flex: "1 1 0%", height: "100%", borderRadius: "3px", transformOrigin: "bottom",
            background: "linear-gradient(to top,#22d3ee 0%,#a855f7 55%,#ec4899 100%)",
            transform: playing ? undefined : "scaleY("+restH+")",
            opacity: playing ? 1 : .5,
            animation: playing ? "eq "+dur+"s ease-in-out "+delay+"s infinite" : "none",
            transition: "transform .35s ease, opacity .35s ease",
          }} />
        );
      })}
    </div>
  );
}

function LiveSetCard(){
  const [playing, setPlaying] = useState(false);
  const [prog, setProg] = useState(0);
  const barRef = useRef(null);
  useEffect(()=>{
    if(!playing) return;
    const id = setInterval(()=>{
      setProg(p=>{ if(p+1>=TOTAL_SECS){ setPlaying(false); return TOTAL_SECS; } return p+1; });
    },1000);
    return ()=>clearInterval(id);
  },[playing]);
  const pct = (prog/TOTAL_SECS)*100;
  const seek = (e)=>{
    const r = barRef.current.getBoundingClientRect();
    const x = ((e.clientX - r.left)/r.width);
    setProg(Math.max(0, Math.min(1,x))*TOTAL_SECS|0);
  };
  return (
    <div className="relative overflow-hidden rounded-[28px] glass-strong ring-grad">
      {/* Backdrop art */}
      <div className="pointer-events-none absolute -right-16 -top-16 h-72 w-72 opacity-40">

            <span className="h-1.5 w-1.5 rounded-full bg-neon-cyan" style={{animation:"blink 1.4s infinite"}} />
            LIVE SET PREVIEW
          </Pill>
          <span className="font-mono text-xs text-white/50">320kbps</span>
        </div>

        <div className="mt-6 flex items-end gap-4">
          <button onClick={()=>setPlaying(p=>!p)}
            className="grid h-16 w-16 shrink-0 place-items-center rounded-full bg-gradient-to-br from-neon-purple to-neon-pink text-white shadow-[0_0_30px_rgba(168,85,247,.6)] transition hover:scale-105 active:scale-95">
            {playing ? I.pause({width:26,height:26}) : I.play({width:26,height:26,style:{marginLeft:3}})}
          </button>
          <div className="min-w-0 flex-1">
            <h3 className="truncate font-display text-xl font-bold text-white">Midnight Keppel Bay Set</h3>
            <p className="mt-0.5 text-sm text-white/50">REY. · Melodic Techno Continuous Mix</p>
          </div>
        </div>

        {/* Wave */}
        <div className="mt-5 h-16 w-full">
          <SoundWave playing={playing} bars={64} />

        {/* Progress */}

            <div className="absolute inset-y-0 left-0 rounded-full bg-gradient-to-r from-neon-cyan via-neon-purple to-neon-pink" style={{width:pct+"%"}} />
            <div className="absolute top-1/2 h-3.5 w-3.5 -translate-y-1/2 -translate-x-1/2 rounded-full bg-white shadow-[0_0_12px_rgba(236,72,153,.9)]" style={{left:pct+"%"}} />

          <div className="mt-2 flex justify-between font-mono text-xs text-white/55">
            <span>{fmtClock(prog)}</span>
            <span>{playing ? "NOW PLAYING" : "62:14 mins"}</span>
            <span>{fmtClock(TOTAL_SECS)}</span>

  );

/* ============================================================
   PROCESSING MODAL (5-min countdown)
   ============================================================ */
function ProcessingModal({ data, onClose }){
  const [left, setLeft] = useState(300);
  useEffect(()=>{
    setLeft(300);
    const id = setInterval(()=>setLeft(l=>l>0?l-1:0),1000);
    return ()=>clearInterval(id);
  },[data]);
  useEffect(()=>{
    const esc = (e)=>{ if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", esc);
    document.body.style.overflow = "hidden";
    return ()=>{ window.removeEventListener("keydown", esc); document.body.style.overflow = ""; };
  },[onClose]);
  if(!data) return null;
  const expired = left===0;
  const waMsg = encodeURIComponent(
    "🍾 REY. — VIP SHARED TABLE\n\n🏛️ Club: "+data.club+"\n📅 Date: "+fmtDateLong(data.date)+
    "\n👥 Slots: "+data.guests+" "+(data.guests>1?"guys":"guy")+"\n🕦 Arrival: 11:15 PM (VIP Line)\n💵 Total: S$"+data.total.toLocaleString()+
    "\n💳 Method: "+data.method+"\n\nLock me in 🔥"
  );

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" role="dialog" aria-modal="true">
      <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={onClose} />
      <div className="animate-pop relative w-full max-w-md overflow-hidden rounded-[28px] glass-strong ring-grad">
        <button onClick={onClose} className="absolute right-4 top-4 z-10 grid h-9 w-9 place-items-center rounded-full border border-white/10 bg-white/5 text-white/70 hover:bg-white/10">{I.x({width:16,height:16})}</button>

        <div className="p-7 text-center">
          <div className="mx-auto grid h-20 w-20 place-items-center rounded-full" style={{background:"radial-gradient(circle,#a855f733,transparent 70%)"}}>
            <svg viewBox="0 0 52 52" className="h-16 w-16">
              <circle cx="26" cy="26" r="23" fill="none" stroke="#a855f7" strokeWidth="3" strokeLinecap="round" strokeDasharray="145" style={{animation:"dash .7s ease forwards",strokeDashoffset:145}} />
              <path d="M16 27l7 7 13-14" fill="none" stroke="#22d3ee" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="40" style={{animation:"dash .5s .4s ease forwards",strokeDashoffset:40}} />
            </svg>
          </div>

          <h3 className="mt-4 font-display text-2xl font-extrabold text-white">{data.method==="WhatsApp Enquiry"?"Enquiry Ready":"Slot Secured"}</h3>
          <p className="mt-1 text-sm text-white/55">{data.method==="WhatsApp Enquiry"?"Send the message to confirm availability.":"Pending payment via "+data.method+". Complete to lock your table."}</p>

          <div className="mt-5 rounded-2xl border border-white/10 bg-black/30 p-4 text-left">
            <div className="flex items-center justify-between"><span className="text-sm text-white/50">Club</span><span className="font-semibold text-white">{data.club}</span></div>
            <div className="mt-2 flex items-center justify-between"><span className="text-sm text-white/50">Date</span><span className="font-semibold text-white">{fmtDateLong(data.date)}</span></div>
            <div className="mt-2 flex items-center justify-between"><span className="text-sm text-white/50">Slots</span><span className="font-semibold text-white">{data.guests} {data.guests>1?"guys":"guy"} · 11:15 PM</span></div>
            <div className="mt-2 flex items-center justify-between border-t border-white/10 pt-2"><span className="text-sm text-white/50">Total</span><span className="font-display text-xl font-extrabold text-grad">S${data.total.toLocaleString()}</span></div>
          </div>

          {data.method!=="WhatsApp Enquiry" && (
            <div className={"mt-5 rounded-2xl border p-4 "+(expired?"border-rose-500/30 bg-rose-500/10":"border-neon-pink/30 bg-neon-pink/[0.07]")}>
              <div className="text-[11px] uppercase tracking-widest text-white/50">{expired?"Hold expired":"Complete payment within"}</div>
              <div className={"font-mono text-4xl font-bold "+(expired?"text-rose-400":"text-white")} style={!expired?{textShadow:"0 0 24px rgba(236,72,153,.6)"}:{}}>{fmtClock(left)}</div>
              {expired
                ? <button onClick={()=>setLeft(300)} className="mt-1 text-xs font-semibold text-neon-cyan underline">Refresh hold →</button>
                : <div className="mt-1 text-[11px] text-white/45">Slot released automatically after countdown</div>}
            </div>
          )}

          <a href={"https://wa.me/"+WA_NUMBER+"?text="+waMsg} target="_blank" rel="noreferrer"
            className="mt-5 flex w-full items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-emerald-500 to-emerald-400 py-3.5 text-sm font-bold text-ink transition hover:scale-[1.02]">
            {I.whatsapp({width:17,height:17})} {data.method==="WhatsApp Enquiry"?"Send Enquiry on WhatsApp":"Send Payment Confirmation"}

    </section>

}
